schema_version: 2          # Config schema version (do not edit manually)

language: en   # Output language (ko | en)

# Document path overrides (optional — defaults shown)
docs:
  tracks: .please/docs/tracks
  product-specs: .please/docs/product-specs
  decisions: .please/docs/decisions
  investigations: .please/docs/investigations
  research: .please/docs/research
  references: .please/docs/references
  knowledge: .please/docs/knowledge

review:
  cubic:
    enabled: true
    default-flags: "--json -b"
  gemini:
    enabled: true
    default-flags: "--sandbox"

# Graphite stacked-PR workflow (consumed by the graphite plugin)
graphite:
  enabled: true
  merge-queue:
    # Which merge-queue mode this repo uses. One of:
    #   graphite | github-native | external | none
    # When unset, the plugin assumes `none` and uses the direct-merge path.
    mode: graphite
    label: "merge-queue"   # used only when mode: graphite (must match Graphite settings)
